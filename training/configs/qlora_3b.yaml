# QLoRA config — Qwen2.5-3B-Instruct (low-end tier, CPU or < 6 GB VRAM)
model:
  name_or_path: "Qwen/Qwen2.5-3B-Instruct"
  torch_dtype: "bfloat16"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  lora_alpha: 128
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./output/finance-qwen-3b"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 4096
  fp16: false
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  load_best_model_at_end: true
  report_to: "none"
  dataloader_num_workers: 2
  remove_unused_columns: false
  dataset_text_field: "text"

data:
  train_file: "./data/training.jsonl"
  eval_split: 0.1
  seed: 42
