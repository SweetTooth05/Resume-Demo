services:

  # ---------------------------------------------------------------------------
  # Reverse proxy + automatic SSL for finance.kevinhe.pro
  # Production only — run with: docker compose --profile production up
  # Not used for local development (access via localhost:3000 instead)
  # ---------------------------------------------------------------------------
  traefik:
    profiles: [production]
    image: traefik:v3.0
    container_name: finance_traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=kevilyfe@hotmail.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - finance_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: finance_app_db
    environment:
      POSTGRES_DB: finance_app
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: finance_app_redis
    networks:
      - finance_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance_app_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://finance_user:finance_password@postgres:5432/finance_app
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - ALLOWED_HOSTS=["https://finance.kevinhe.pro","http://localhost:3000","http://127.0.0.1:3000","http://localhost:8000","http://127.0.0.1:8000"]
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./StockPredictionModel:/StockPredictionModel
    networks:
      - finance_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (nginx) — serves app + proxies /api to backend
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel — share local Docker stack on the public internet
  # (no router port-forwarding). Not for production secrets.
  #
  # Quick demo URL (random *.trycloudflare.com each run):
  #   docker compose --profile tunnel up -d
  #   docker compose logs -f cloudflared
  #
  # Named tunnel: see cloudflared/config.yml.example and use profile tunnel-named.
  # ---------------------------------------------------------------------------
  cloudflared:
    profiles: [tunnel]
    image: cloudflare/cloudflared:latest
    container_name: finance_cloudflared
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      - frontend
    networks:
      - finance_network
    restart: "no"

  cloudflared-named:
    profiles: [tunnel-named]
    image: cloudflare/cloudflared:latest
    container_name: finance_cloudflared_named
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - frontend
    networks:
      - finance_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: finance_app_frontend
    ports:
      - "3000:3000"
    # Do not mount ./frontend over /usr/share/nginx/html — that replaced the
    # Vite-built React app with the legacy static index.html + js/*.js tree.
    depends_on:
      - backend
    networks:
      - finance_network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTPS route
      - "traefik.http.routers.frontend-secure.rule=Host(`finance.kevinhe.pro`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`finance.kevinhe.pro`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

volumes:
  postgres_data:
  letsencrypt:

networks:
  finance_network:
    driver: bridge
